<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 800" font-family="Inter, system-ui, sans-serif" font-size="13">
  <title>typecarta Architecture Map — Conceptual Analysis</title>
  <desc>Concept nodes color-coded by classification, capability cluster regions, semantic/governing edges, tension hotspots, and invariant badges.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="8" markerHeight="5" orient="auto-start-reverse">
      <path d="M0,0 L10,3 L0,6 Z" fill="#64748b"/>
    </marker>
    <marker id="arrow-gov" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="8" markerHeight="5" orient="auto-start-reverse">
      <path d="M0,0 L10,3 L0,6 Z" fill="#dc2626"/>
    </marker>
    <marker id="arrow-data" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="8" markerHeight="5" orient="auto-start-reverse">
      <path d="M0,0 L10,3 L0,6 Z" fill="#2563eb"/>
    </marker>
    <filter id="shadow">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1100" height="800" fill="#fafafa" rx="8"/>

  <!-- Legend -->
  <g transform="translate(20, 20)">
    <text font-size="11" font-weight="600" fill="#334155">LEGEND</text>
    <rect x="0" y="10" width="14" height="14" rx="3" fill="#3b82f6" opacity="0.85"/>
    <text x="20" y="22" font-size="10" fill="#475569">Domain concept</text>
    <rect x="0" y="30" width="14" height="14" rx="3" fill="#f59e0b" opacity="0.85"/>
    <text x="20" y="42" font-size="10" fill="#475569">Control concept</text>
    <rect x="0" y="50" width="14" height="14" rx="3" fill="#8b5cf6" opacity="0.85"/>
    <text x="20" y="62" font-size="10" fill="#475569">Platform/Integration</text>
    <line x1="150" y1="18" x2="190" y2="18" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-data)"/>
    <text x="196" y="22" font-size="10" fill="#475569">Data flow</text>
    <line x1="150" y1="38" x2="190" y2="38" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-gov)"/>
    <text x="196" y="42" font-size="10" fill="#475569">Governing edge</text>
    <rect x="150" y="50" width="14" height="14" rx="7" fill="#ef4444" opacity="0.2" stroke="#ef4444" stroke-width="1.5"/>
    <text x="170" y="62" font-size="10" fill="#475569">Tension hotspot</text>
    <rect x="300" y="10" width="14" height="14" rx="3" fill="none" stroke="#059669" stroke-width="1.5"/>
    <text x="320" y="22" font-size="10" fill="#475569">Invariant badge</text>
  </g>

  <!-- ═══════════════ CAPABILITY CLUSTER: Formal Foundation ═══════════════ -->
  <rect x="40" y="90" width="340" height="260" rx="12" fill="#eff6ff" stroke="#93c5fd" stroke-width="1" opacity="0.7"/>
  <text x="55" y="112" font-size="11" font-weight="600" fill="#1e40af" letter-spacing="0.5">FORMAL FOUNDATION</text>

  <!-- Value Universe -->
  <g transform="translate(70, 130)" filter="url(#shadow)">
    <rect width="120" height="50" rx="8" fill="#3b82f6" opacity="0.85"/>
    <text x="60" y="22" text-anchor="middle" fill="white" font-weight="600" font-size="12">Value Universe</text>
    <text x="60" y="38" text-anchor="middle" fill="#dbeafe" font-size="10">V = {all values}</text>
  </g>

  <!-- Extension -->
  <g transform="translate(220, 130)" filter="url(#shadow)">
    <rect width="130" height="50" rx="8" fill="#3b82f6" opacity="0.85"/>
    <text x="65" y="22" text-anchor="middle" fill="white" font-weight="600" font-size="12">Extension</text>
    <text x="65" y="38" text-anchor="middle" fill="#dbeafe" font-size="10">[[t]] c V</text>
  </g>

  <!-- Signature -->
  <g transform="translate(70, 210)" filter="url(#shadow)">
    <rect width="120" height="50" rx="8" fill="#3b82f6" opacity="0.85"/>
    <text x="60" y="22" text-anchor="middle" fill="white" font-weight="600" font-size="12">Signature</text>
    <text x="60" y="38" text-anchor="middle" fill="#dbeafe" font-size="10">(B, F, ar)</text>
  </g>

  <!-- Schema Class -->
  <g transform="translate(220, 210)" filter="url(#shadow)">
    <rect width="130" height="50" rx="8" fill="#3b82f6" opacity="0.85"/>
    <text x="65" y="22" text-anchor="middle" fill="white" font-weight="600" font-size="12">Schema Class</text>
    <text x="65" y="38" text-anchor="middle" fill="#dbeafe" font-size="10">universality target</text>
  </g>

  <!-- Impossibility Boundary -->
  <g transform="translate(110, 290)" filter="url(#shadow)">
    <rect width="200" height="44" rx="8" fill="#3b82f6" opacity="0.85" stroke="#ef4444" stroke-width="2"/>
    <text x="100" y="20" text-anchor="middle" fill="white" font-weight="600" font-size="12">Impossibility Boundary</text>
    <text x="100" y="35" text-anchor="middle" fill="#fecaca" font-size="10">no finite IR models all langs</text>
  </g>

  <!-- Invariant badge on Impossibility -->
  <rect x="295" y="287" width="18" height="18" rx="9" fill="none" stroke="#059669" stroke-width="1.5"/>
  <text x="304" y="300" text-anchor="middle" fill="#059669" font-size="10" font-weight="700">T</text>

  <!-- Data flow: Value Universe -> Extension -->
  <line x1="190" y1="155" x2="218" y2="155" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-data)"/>

  <!-- Governing: Impossibility -> Schema Class -->
  <line x1="210" y1="290" x2="285" y2="262" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-gov)"/>

  <!-- ═══════════════ CAPABILITY CLUSTER: AST & Measurement ═══════════════ -->
  <rect x="410" y="90" width="320" height="340" rx="12" fill="#f0fdf4" stroke="#86efac" stroke-width="1" opacity="0.7"/>
  <text x="425" y="112" font-size="11" font-weight="600" fill="#166534" letter-spacing="0.5">AST &amp; MEASUREMENT ENGINE</text>

  <!-- TypeTerm (central) -->
  <g transform="translate(450, 135)" filter="url(#shadow)">
    <rect width="150" height="56" rx="8" fill="#3b82f6" opacity="0.95" stroke="#1d4ed8" stroke-width="2"/>
    <text x="75" y="24" text-anchor="middle" fill="white" font-weight="700" font-size="14">TypeTerm</text>
    <text x="75" y="42" text-anchor="middle" fill="#dbeafe" font-size="10">16 node kinds + Extension</text>
  </g>

  <!-- Invariant badge on TypeTerm -->
  <rect x="586" y="132" width="18" height="18" rx="9" fill="none" stroke="#059669" stroke-width="1.5"/>
  <text x="595" y="145" text-anchor="middle" fill="#059669" font-size="10" font-weight="700">E</text>

  <!-- CriterionPredicate -->
  <g transform="translate(440, 220)" filter="url(#shadow)">
    <rect width="160" height="50" rx="8" fill="#3b82f6" opacity="0.85"/>
    <text x="80" y="22" text-anchor="middle" fill="white" font-weight="600" font-size="12">CriterionPredicate</text>
    <text x="80" y="38" text-anchor="middle" fill="#dbeafe" font-size="10">pi: T(S) -> {T, F, ?}</text>
  </g>

  <!-- MetaTag (control) -->
  <g transform="translate(620" y="220)" filter="url(#shadow)">
    <rect x="620" y="220" width="90" height="50" rx="8" fill="#f59e0b" opacity="0.85"/>
    <text x="665" y="242" text-anchor="middle" fill="white" font-weight="600" font-size="11">MetaTag</text>
    <text x="665" y="258" text-anchor="middle" fill="#fef3c7" font-size="9">op|coerce|multi|annot</text>
  </g>

  <!-- Witness Schema -->
  <g transform="translate(440, 295)" filter="url(#shadow)">
    <rect width="140" height="50" rx="8" fill="#3b82f6" opacity="0.85"/>
    <text x="70" y="22" text-anchor="middle" fill="white" font-weight="600" font-size="12">Witness Schema</text>
    <text x="70" y="38" text-anchor="middle" fill="#dbeafe" font-size="10">15 core + 70 expanded</text>
  </g>

  <!-- Encoding -->
  <g transform="translate(440, 370)" filter="url(#shadow)">
    <rect width="130" height="46" rx="8" fill="#3b82f6" opacity="0.85"/>
    <text x="65" y="20" text-anchor="middle" fill="white" font-weight="600" font-size="12">Encoding</text>
    <text x="65" y="36" text-anchor="middle" fill="#dbeafe" font-size="10">phi: T(S_src)->T(S_tgt)</text>
  </g>

  <!-- Data flows within AST cluster -->
  <line x1="525" y1="191" x2="520" y2="218" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-data)"/>
  <line x1="510" y1="270" x2="510" y2="293" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-data)"/>
  <line x1="505" y1="345" x2="505" y2="368" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-data)"/>

  <!-- Governing: MetaTag -> CriterionPredicate -->
  <line x1="620" y1="245" x2="602" y2="245" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-gov)"/>

  <!-- Data flow from Formal Foundation to AST -->
  <line x1="352" y1="155" x2="448" y2="163" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-data)"/>
  <line x1="190" y1="235" x2="448" y2="175" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-data)" opacity="0.5"/>

  <!-- ═══════════════ CAPABILITY CLUSTER: Evaluation Output ═══════════════ -->
  <rect x="760" y="90" width="310" height="200" rx="12" fill="#fefce8" stroke="#fde047" stroke-width="1" opacity="0.7"/>
  <text x="775" y="112" font-size="11" font-weight="600" fill="#854d0e" letter-spacing="0.5">EVALUATION OUTPUT</text>

  <!-- Scorecard -->
  <g transform="translate(790, 130)" filter="url(#shadow)">
    <rect width="130" height="50" rx="8" fill="#3b82f6" opacity="0.85"/>
    <text x="65" y="22" text-anchor="middle" fill="white" font-weight="600" font-size="12">Scorecard</text>
    <text x="65" y="38" text-anchor="middle" fill="#dbeafe" font-size="10">check/partial/cross per pi</text>
  </g>

  <!-- Encoding-Check (rho) -->
  <g transform="translate(790, 210)" filter="url(#shadow)">
    <rect width="140" height="50" rx="8" fill="#3b82f6" opacity="0.85"/>
    <text x="70" y="22" text-anchor="middle" fill="white" font-weight="600" font-size="12">Encoding-Check</text>
    <text x="70" y="38" text-anchor="middle" fill="#dbeafe" font-size="10">rho_W, rho_D, rho_G, rho_B</text>
  </g>

  <!-- Refinement Predicate -->
  <g transform="translate(950" y="130)" filter="url(#shadow)">
    <rect x="950" y="130" width="100" height="50" rx="8" fill="#3b82f6" opacity="0.75"/>
    <text x="1000" y="152" text-anchor="middle" fill="white" font-weight="600" font-size="11">Refinement</text>
    <text x="1000" y="166" text-anchor="middle" fill="#dbeafe" font-size="9">Predicate</text>
  </g>

  <!-- Data flows to Evaluation Output -->
  <line x1="600" y1="245" x2="788" y2="155" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-data)" opacity="0.7"/>
  <line x1="572" y1="393" x2="788" y2="235" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-data)" opacity="0.7"/>

  <!-- TENSION HOTSPOT: Sampling vs Exactness -->
  <g transform="translate(940, 210)">
    <rect width="110" height="44" rx="8" fill="#ef4444" opacity="0.12" stroke="#ef4444" stroke-width="1.5"/>
    <text x="55" y="18" text-anchor="middle" fill="#dc2626" font-weight="600" font-size="10">TENSION</text>
    <text x="55" y="32" text-anchor="middle" fill="#dc2626" font-size="9">Sampling vs</text>
    <text x="55" y="42" text-anchor="middle" fill="#dc2626" font-size="9">Exactness</text>
  </g>

  <!-- ═══════════════ CAPABILITY CLUSTER: Adapter Layer ═══════════════ -->
  <rect x="40" y="400" width="690" height="180" rx="12" fill="#faf5ff" stroke="#d8b4fe" stroke-width="1" opacity="0.7"/>
  <text x="55" y="422" font-size="11" font-weight="600" fill="#6b21a8" letter-spacing="0.5">ADAPTER LAYER (Plugin Boundary)</text>

  <!-- IRAdapter (control) -->
  <g transform="translate(60, 445)" filter="url(#shadow)">
    <rect width="160" height="56" rx="8" fill="#f59e0b" opacity="0.9" stroke="#d97706" stroke-width="2"/>
    <text x="80" y="24" text-anchor="middle" fill="white" font-weight="700" font-size="13">IRAdapter</text>
    <text x="80" y="42" text-anchor="middle" fill="#fef3c7" font-size="10">&lt;Sig, Native&gt;</text>
  </g>

  <!-- Invariant badge on IRAdapter -->
  <rect x="206" y="442" width="18" height="18" rx="9" fill="none" stroke="#059669" stroke-width="1.5"/>
  <text x="215" y="455" text-anchor="middle" fill="#059669" font-size="10" font-weight="700">C</text>

  <!-- Concrete adapters -->
  <g transform="translate(260, 440)">
    <rect width="100" height="36" rx="6" fill="#8b5cf6" opacity="0.8"/>
    <text x="50" y="22" text-anchor="middle" fill="white" font-size="10" font-weight="600">JSON Schema</text>
  </g>
  <g transform="translate(370, 440)">
    <rect width="70" height="36" rx="6" fill="#8b5cf6" opacity="0.8"/>
    <text x="35" y="22" text-anchor="middle" fill="white" font-size="10" font-weight="600">Zod</text>
  </g>
  <g transform="translate(450, 440)">
    <rect width="90" height="36" rx="6" fill="#8b5cf6" opacity="0.8"/>
    <text x="45" y="22" text-anchor="middle" fill="white" font-size="10" font-weight="600">TypeScript</text>
  </g>
  <g transform="translate(550, 440)">
    <rect width="80" height="36" rx="6" fill="#8b5cf6" opacity="0.8"/>
    <text x="40" y="22" text-anchor="middle" fill="white" font-size="10" font-weight="600">Protobuf</text>
  </g>
  <g transform="translate(640, 440)">
    <rect width="70" height="36" rx="6" fill="#8b5cf6" opacity="0.8"/>
    <text x="35" y="22" text-anchor="middle" fill="white" font-size="10" font-weight="600">Avro</text>
  </g>
  <g transform="translate(310, 490)">
    <rect width="80" height="36" rx="6" fill="#8b5cf6" opacity="0.8"/>
    <text x="40" y="22" text-anchor="middle" fill="white" font-size="10" font-weight="600">GraphQL</text>
  </g>
  <g transform="translate(400, 490)">
    <rect width="110" height="36" rx="6" fill="#8b5cf6" opacity="0.8"/>
    <text x="55" y="22" text-anchor="middle" fill="white" font-size="10" font-weight="600">Effect Schema</text>
  </g>

  <!-- Data flow: IRAdapter -> TypeTerm -->
  <line x1="140" y1="445" x2="485" y2="191" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-data)"/>
  <text x="280" y="310" font-size="9" fill="#2563eb" font-style="italic">parse() / encode()</text>

  <!-- TENSION HOTSPOT: AST Stability vs Criterion Growth -->
  <g transform="translate(615, 130)">
    <rect width="120" height="44" rx="8" fill="#ef4444" opacity="0.12" stroke="#ef4444" stroke-width="1.5"/>
    <text x="60" y="18" text-anchor="middle" fill="#dc2626" font-weight="600" font-size="10">TENSION</text>
    <text x="60" y="32" text-anchor="middle" fill="#dc2626" font-size="9">AST Stability vs</text>
    <text x="60" y="42" text-anchor="middle" fill="#dc2626" font-size="9">Criterion Growth</text>
  </g>

  <!-- TENSION HOTSPOT: Adapter Burden -->
  <g transform="translate(530, 530)">
    <rect width="120" height="44" rx="8" fill="#ef4444" opacity="0.12" stroke="#ef4444" stroke-width="1.5"/>
    <text x="60" y="18" text-anchor="middle" fill="#dc2626" font-weight="600" font-size="10">TENSION</text>
    <text x="60" y="32" text-anchor="middle" fill="#dc2626" font-size="9">Adapter Burden vs</text>
    <text x="60" y="42" text-anchor="middle" fill="#dc2626" font-size="9">Measurement Completeness</text>
  </g>

  <!-- ═══════════════ CLI Layer ═══════════════ -->
  <rect x="760" y="320" width="310" height="130" rx="12" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1" opacity="0.7"/>
  <text x="775" y="342" font-size="11" font-weight="600" fill="#334155" letter-spacing="0.5">CLI (User Surface)</text>

  <g transform="translate(780, 360)">
    <rect width="80" height="30" rx="5" fill="#64748b" opacity="0.8"/>
    <text x="40" y="20" text-anchor="middle" fill="white" font-size="10">scorecard</text>
  </g>
  <g transform="translate(870, 360)">
    <rect width="70" height="30" rx="5" fill="#64748b" opacity="0.8"/>
    <text x="35" y="20" text-anchor="middle" fill="white" font-size="10">compare</text>
  </g>
  <g transform="translate(950, 360)">
    <rect width="70" height="30" rx="5" fill="#64748b" opacity="0.8"/>
    <text x="35" y="20" text-anchor="middle" fill="white" font-size="10">witness</text>
  </g>
  <g transform="translate(780, 400)">
    <rect width="70" height="30" rx="5" fill="#64748b" opacity="0.8"/>
    <text x="35" y="20" text-anchor="middle" fill="white" font-size="10">profile</text>
  </g>
  <g transform="translate(860, 400)">
    <rect width="110" height="30" rx="5" fill="#64748b" opacity="0.8"/>
    <text x="55" y="20" text-anchor="middle" fill="white" font-size="10">check-encoding</text>
  </g>

  <!-- Data flow: CLI -> Scorecard/Encoding-Check -->
  <line x1="855" y1="320" x2="855" y2="262" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ═══════════════ Governing: Spec -> Everything ═══════════════ -->
  <g transform="translate(760, 490)">
    <rect width="310" height="70" rx="12" fill="#fff1f2" stroke="#fca5a5" stroke-width="1.5" opacity="0.7"/>
    <text x="155" y="22" text-anchor="middle" font-size="11" font-weight="600" fill="#991b1b" letter-spacing="0.5">FORMAL SPECIFICATION (Sovereign)</text>
    <text x="155" y="42" text-anchor="middle" font-size="10" fill="#991b1b">spec/schema-ir-expressiveness-map.md v2.2.0</text>
    <text x="155" y="56" text-anchor="middle" font-size="9" fill="#b91c1c" font-style="italic">28 definitions | 70 criteria | proof sketches only</text>
  </g>

  <!-- Governing: Spec -> all clusters -->
  <line x1="760" y1="510" x2="380" y2="350" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-gov)" opacity="0.5"/>
  <line x1="850" y1="490" x2="850" y2="462" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-gov)" opacity="0.5"/>

  <!-- TENSION: Spec Sovereignty vs Implementation -->
  <g transform="translate(760, 580)">
    <rect width="160" height="44" rx="8" fill="#ef4444" opacity="0.12" stroke="#ef4444" stroke-width="1.5"/>
    <text x="80" y="18" text-anchor="middle" fill="#dc2626" font-weight="600" font-size="10">TENSION</text>
    <text x="80" y="32" text-anchor="middle" fill="#dc2626" font-size="9">Spec Sovereignty vs</text>
    <text x="80" y="42" text-anchor="middle" fill="#dc2626" font-size="9">Implementation Pragmatism</text>
  </g>

  <!-- Invariant badges legend -->
  <g transform="translate(40, 620)">
    <text font-size="10" font-weight="600" fill="#059669">INVARIANT BADGES:</text>
    <text x="0" y="16" font-size="9" fill="#475569">E = Exhaustive visitor (compile-time)   C = Contract completeness (interface)   T = Theorem (mathematical)</text>
  </g>

  <!-- Computational model note -->
  <g transform="translate(40, 660)">
    <text font-size="10" font-weight="600" fill="#334155">COMPUTATIONAL MODEL: Pure Dataflow Pipeline</text>
    <text x="0" y="16" font-size="9" fill="#475569">Native Schema -> parse -> TypeTerm -> criterion/encode -> Result -> scorecard/rho-check -> Report</text>
    <text x="0" y="30" font-size="9" fill="#475569">No mutable state. No events. No async. All functions synchronous.</text>
  </g>

  <!-- Data flow summary -->
  <g transform="translate(40, 720)">
    <text font-size="10" font-weight="600" fill="#334155">KEY DATA ITEM TRACED: TypeTerm</text>
    <text x="0" y="16" font-size="9" fill="#475569">Crosses 5 boundaries: Adapter -> AST -> Criteria -> Encoding -> Scorecard/rho-check. Highest business value. Primary change-impact subject.</text>
  </g>

  <!-- Title -->
  <text x="550" y="780" text-anchor="middle" font-size="10" fill="#94a3b8">typecarta v0.1.0 — Conceptual Architecture Map — Analysis date: 2026-04-04</text>
</svg>
