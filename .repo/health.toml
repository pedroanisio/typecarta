# .repo/health.toml — Environment health requirements
# Run `repo health` to check, `repo health export` to snapshot current state.

[environment]
# Privilege escalation: "auto", "sudo", "doas", "pkexec", or "none"
privilege = "auto"

# Allowed runtimes (empty = any). Values: "host", "docker", "podman", "lxc", "wsl", "kubernetes"
allowed_runtimes = []

# Required default shell (must be in /etc/shells). Comment out to skip.
# required_shell = "zsh"

# ── Tools ────────────────────────────────────────────────────────────
# Each [tools.<name>] block declares a tool requirement.
#
# Fields:
#   required      = true              # fail if missing (default: true)
#   min_version   = "1.70.0"          # minimum version (numeric compare)
#   exact_version = "20.11.0"         # exact version match
#   command       = "python3"          # binary to probe (defaults to tool name)
#   version_args  = ["--version"]      # args to get version (defaults to --version)
#   url           = "https://..."      # source of truth for latest version / releases
#   install       = "curl ... | sh"    # install command (shown when missing or outdated)
#   latest_cmd    = "npm"              # command to check latest version
#   latest_args   = ["view","X","version"] # args for latest check

